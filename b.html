<!DOCTYPE html>
<html lang="kk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeSchool - Программалау Курсы</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap');

        :root {
            --bg: #f8fafc;
            --white: #ffffff;
            --primary: #407740;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --accent: #f1f5f9;
            --border: #e2e8f0;
            --warning: #f59e0b;
            --csharp: #9b4f96;
            --cpp: #00599c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        .screen {
            width: 100vw;
            height: 100vh;
            transition: 0.4s;
        }

        .hidden {
            display: none !important;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        .lang-cards {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .lang-card {
            background: var(--white);
            padding: 30px;
            border-radius: 24px;
            width: 200px;
            text-align: center;
            cursor: pointer;
            border: 2px solid var(--border);
            transition: 0.3s;
        }

        .lang-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .lang-card i {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .lang-card.python i {
            color: #3776ab;
        }

        .lang-card.csharp i {
            color: var(--csharp);
        }

        .lang-card.cpp i {
            color: var(--cpp);
        }

        .lang-card h3 {
            font-size: 20px;
            margin-top: 10px;
        }

        .app-container {
            display: flex;
            height: 100vh;
            background: var(--white);
        }

        .sidebar {
            width: 320px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: #fcfcfd;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 35px;
            height: 35px;
            cursor: pointer;
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .task-node {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: not-allowed;
            opacity: 0.4;
        }

        .task-node.unlocked {
            cursor: pointer;
            opacity: 1;
            background: #fff;
            border: 1px solid var(--border);
        }

        .task-node.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .task-node.csharp-active {
            background: var(--csharp);
            color: white;
            border-color: var(--csharp);
        }

        .task-node.cpp-active {
            background: var(--cpp);
            color: white;
            border-color: var(--cpp);
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .theory-area {
            height: 55%;
            padding: 30px;
            overflow-y: auto;
            border-bottom: 1px solid var(--border);
            background: #fff;
        }

        .theory-label {
            font-size: 12px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .theory-label.csharp {
            color: var(--csharp);
        }

        .theory-label.cpp {
            color: var(--cpp);
        }

        .task-description {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            margin-bottom: 20px;
        }

        .task-description.csharp {
            border-left-color: var(--csharp);
        }

        .task-description.cpp {
            border-left-color: var(--cpp);
        }

        .task-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--text-main);
        }

        .task-text {
            line-height: 1.8;
            color: #334155;
            font-size: 15px;
            margin-bottom: 15px;
        }

        .io-section {
            margin: 15px 0;
        }

        .io-title {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .io-title.csharp {
            color: var(--csharp);
        }

        .io-title.cpp {
            color: var(--cpp);
        }

        .io-content {
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 14px;
            color: #475569;
            font-family: 'JetBrains Mono', monospace;
        }

        .example-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }

        .example-table th {
            background: var(--primary);
            color: white;
            padding: 10px;
            text-align: left;
        }

        .example-table th.csharp {
            background: var(--csharp);
        }

        .example-table th.cpp {
            background: var(--cpp);
        }

        .example-table td {
            padding: 10px;
            border: 1px solid var(--border);
            background: #fff;
            font-family: 'JetBrains Mono', monospace;
        }

        .example-table tr:nth-child(even) td {
            background: #f8fafc;
        }

        .complexity-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #e0f2fe;
            color: #0369a1;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
            margin-right: 5px;
        }

        .practice-area {
            flex: 1;
            display: flex;
            background: #f1f5f9;
            padding: 20px;
            gap: 20px;
        }

        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .editor-top {
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #code-input {
            flex: 1;
            padding: 20px;
            font-family: 'JetBrains Mono';
            font-size: 14px;
            border: none;
            outline: none;
            resize: none;
            line-height: 1.6;
        }

        .terminal {
            width: 380px;
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            color: #fff;
            font-family: 'JetBrains Mono';
            font-size: 13px;
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            opacity: 0.5;
            font-size: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .terminal-content {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .btn-run {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-run:hover {
            background: #365c36;
        }

        .btn-run.csharp {
            background: var(--csharp);
        }

        .btn-run.csharp:hover {
            background: #7a3d7a;
        }

        .btn-run.cpp {
            background: var(--cpp);
        }

        .btn-run.cpp:hover {
            background: #004a7f;
        }

        .btn-help {
            background: var(--warning);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-help:hover {
            background: #d97706;
        }

        .ai-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .ai-modal.active {
            display: flex;
        }

        .ai-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .ai-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .ai-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--warning);
        }

        .ai-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        .ai-text {
            line-height: 1.8;
            color: #334155;
        }
    </style>
</head>

<body>

    <div id="welcome" class="screen welcome-screen">
        <h1 style="font-size: 40px; font-weight: 800;">CodeSchool</h1>
        <p style="color: var(--text-dim); margin-bottom: 50px;">Тілді таңдап, үйренуді бастаңыз</p>
        <div class="lang-cards">
            <div class="lang-card python" onclick="start('Python')"><i class='bx bxl-python'></i>
                <h3>Python</h3>
            </div>
            <div class="lang-card csharp" onclick="start('C#')"><i class='bx bxl-visual-studio'></i>
                <h3>C#</h3>
            </div>
            <div class="lang-card cpp" onclick="start('C++')"><i class='bx bxl-c-plus-plus'></i>
                <h3>C++</h3>
            </div>
        </div>
    </div>

    <div id="app" class="screen hidden">
        <div class="app-container">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <button class="back-btn" onclick="goBack()"><i class='bx bx-chevron-left'></i></button>
                    <span id="cur-lang" style="font-weight: 800;">Python Курсы</span>
                </div>
                <div id="task-list" class="task-list"></div>
            </aside>

            <main class="content">
                <div class="theory-area">
                    <div id="task-content"></div>
                </div>

                <div class="practice-area">
                    <div class="editor-container">
                        <div class="editor-top">
                            <span id="filename" style="font-size: 12px; color: var(--text-dim);">Program.cs</span>
                            <div style="display: flex; gap: 10px;">
                                <button class="btn-help" onclick="showAIHelp()"><i class='bx bx-brain'></i> AI
                                    Көмек</button>
                                <button id="check-btn" class="btn-run" onclick="checkCode()">Тексеру</button>
                            </div>
                        </div>
                        <textarea id="code-input" spellcheck="false"
                            placeholder="// Кодты осында жазыңыз..."></textarea>
                    </div>
                    <div class="terminal">
                        <div class="terminal-header">
                            <span>CONSOLE</span>
                            <span id="status-badge">Дайын</span>
                        </div>
                        <div id="out" class="terminal-content">> Жүйе дайын...</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="ai-modal" class="ai-modal" onclick="closeAIModal(event)">
        <div class="ai-content" onclick="event.stopPropagation()">
            <div class="ai-header">
                <div class="ai-title"><i class='bx bx-brain'></i> AI Көмекші</div>
                <button class="ai-close" onclick="closeAIModal()">&times;</button>
            </div>
            <div id="ai-text" class="ai-text"></div>
        </div>
    </div>

    <script>
        // 👇 ОСЫ ЖЕРГЕ ҚОС
        let curI = 0;

        window.onload = function () {
            curI = 0;
            // Автоматически читаем lang из URL если есть
            const params = new URLSearchParams(window.location.search);
            const lang = params.get('lang');
            if (lang === 'cpp') start('C++');
            else if (lang === 'csharp') start('C#');
            else if (lang === 'python') start('Python');
            // иначе показываем экран выбора языка
        }
        // PYTHON ТАПСЫРМАЛАРЫ (25)
        const pythonLessons = [
            {
                id: 1, title: "A + B", complexity: "2%", time: "1 сек", memory: "16 МБ",
                description: "Екі бүтін сан A және B берілген. Олардың қосындысын табу керек.",
                input: "Бір қатарда екі бүтін сан беріледі (A және B). Сандар 10^9-дан аспайды.",
                output: "Бір қатарда A + B қосындысын шығарыңыз.",
                examples: [{ input: "2 3", output: "5" }, { input: "10 20", output: "30" }],
                check: (code) => code.includes('input') && code.includes('print') && code.includes('+'),
                validate: (code) => {
                    const errors = [];
                    if (!code.includes('input')) errors.push("input() функциясы жоқ - сандарды оқу керек");
                    if (!code.includes('print')) errors.push("print() функциясы жоқ - нәтижені шығару керек");
                    if (!code.includes('+')) errors.push("Қосу операциясы (+) табылмады");
                    return errors;
                },
                aiHelp: "Бұл тапсырмада input().split() арқылы екі санды оқыңыз, int() түріне айналдырып, қосыңыз да print() арқылы шығарыңыз. Мысалы: a, b = map(int, input().split())"
            },
            {
                id: 2, title: "Үш санның қосындысы", complexity: "3%", time: "1 сек", memory: "16 МБ",
                description: "Үш бүтін сан берілген. Олардың қосындысын табыңыз.",
                input: "Бір қатарда үш бүтін сан беріледі.",
                output: "Бір қатарда үш санның қосындысын шығарыңыз.",
                examples: [{ input: "1 2 3", output: "6" }, { input: "5 10 15", output: "30" }],
                check: (code) => code.includes('input') && code.includes('print') && code.includes('+'),
                validate: (code) => {
                    const errors = [];
                    if (!code.includes('input')) errors.push("Сандарды оқу үшін input() қажет");
                    if (!code.includes('print')) errors.push("Нәтижені шығару үшін print() қажет");
                    return errors;
                },
                aiHelp: "Екі сандық тапсырма сияқты, бірақ енді үш айнымалы қажет. a, b, c = map(int, input().split()) деп алып, print(a + b + c) жасаңыз."
            },
            {
                id: 3, title: "Айырма", complexity: "3%", time: "1 сек", memory: "16 МБ",
                description: "Екі бүтін сан берілген. Алып тастағыштан азайтқышты азайту керек (A - B).",
                input: "Екі бүтін сан A және B беріледі.",
                output: "A - B айырмасын шығарыңыз.",
                examples: [{ input: "10 3", output: "7" }, { input: "5 8", output: "-3" }],
                check: (code) => code.includes('input') && code.includes('print') && code.includes('-'),
                validate: (code) => {
                    const errors = [];
                    if (!code.includes('input')) errors.push("input() функциясы жоқ");
                    if (!code.includes('-')) errors.push("Азайту операциясы (-) табылмады");
                    return errors;
                },
                aiHelp: "Азайту операциясы - қолданылады. Ескерту: тапсырмада A - B керек, яғни бірінші саннан екіншіні азайту керек."
            },
            {
                id: 4, title: "Көбейтінді", complexity: "3%", time: "1 сек", memory: "16 МБ",
                description: "Екі бүтін сан берілген. Олардың көбейтіндісін табыңыз.",
                input: "Екі бүтін сан A және B.",
                output: "A * B көбейтіндісін шығарыңыз.",
                examples: [{ input: "4 5", output: "20" }, { input: "7 3", output: "21" }],
                check: (code) => code.includes('input') && code.includes('print') && code.includes('*'),
                validate: (code) => {
                    const errors = [];
                    if (!code.includes('*')) errors.push("Көбейту операциясы (*) табылмады");
                    return errors;
                },
                aiHelp: "Көбейту үшін * белгісін қолданыңыз. Мысалы: result = a * b"
            },
            {
                id: 5, title: "Бөлінді", complexity: "4%", time: "1 сек", memory: "16 МБ",
                description: "Екі бүтін сан берілген. Бөліндіні бүтін санға бөлуден табыңыз (A // B).",
                input: "Екі бүтін сан A және B (B ≠ 0).",
                output: "A // B бүтін бөліндісін шығарыңыз.",
                examples: [{ input: "17 5", output: "3" }, { input: "20 4", output: "5" }],
                check: (code) => code.includes('//') || (code.includes('/') && code.includes('int')),
                validate: (code) => {
                    const errors = [];
                    if (!code.includes('//') && !code.includes('/')) errors.push("Бөлу операциясы табылмады");
                    return errors;
                },
                aiHelp: "Python-да бүтін бөлу // операторымен жасалады. Қарапайым / болса, бөлшек сан шығады."
            },
            {
                id: 6, title: "Қалдық", complexity: "4%", time: "1 сек", memory: "16 МБ",
                description: "Екі бүтін сан берілген. Біріншіні екіншісіне бөлгендегі қалдықты табыңыз.",
                input: "Екі бүтін сан A және B.",
                output: "A % B қалдығын шығарыңыз.",
                examples: [{ input: "17 5", output: "2" }, { input: "20 4", output: "0" }],
                check: (code) => code.includes('%'),
                validate: (code) => {
                    const errors = [];
                    if (!code.includes('%')) errors.push("Қалдықты табу үшін % операторы керек");
                    return errors;
                },
                aiHelp: "Қалдықты табу үшін % (модуль) операторын қолданыңыз."
            },
            {
                id: 7, title: "Үшбұрыштың периметрі", complexity: "5%", time: "1 сек", memory: "16 МБ",
                description: "Үшбұрыштың үш қабырғасының ұзындығы берілген. Периметрін табыңыз.",
                input: "Үш бүтін сан - қабырғалар ұзындығы.",
                output: "Периметрін шығарыңыз.",
                examples: [{ input: "3 4 5", output: "12" }, { input: "10 10 10", output: "30" }],
                check: (code) => code.includes('input') && code.includes('print'),
                validate: (code) => {
                    const errors = [];
                    if (!code.includes('input')) errors.push("Қабырғаларды оқу керек");
                    return errors;
                },
                aiHelp: "Үш санды оқыңыз және оларды қосыңыз. Периметр = a + b + c"
            },
            {
                id: 8, title: "Тік төртбұрыштың ауданы", complexity: "5%", time: "1 сек", memory: "16 МБ",
                description: "Тік төртбұрыштың екі қабырғасы берілген. Ауданын табыңыз.",
                input: "Екі бүтін сан - ені мен ұзындығы.",
                output: "Ауданын шығарыңыз.",
                examples: [{ input: "5 3", output: "15" }, { input: "10 10", output: "100" }],
                check: (code) => code.includes('input') && code.includes('*'),
                validate: (code) => {
                    const errors = [];
                    if (!code.includes('*')) errors.push("Аудан = ені × ұзындық, көбейту керек");
                    return errors;
                },
                aiHelp: "Тік төртбұрыш ауданы = ені × биіктік. Екі санды көбейтіңіз."
            },
            {
                id: 9, title: "Шеңбердің ұзындығы", complexity: "6%", time: "1 сек", memory: "16 МБ",
                description: "Шеңбердің радиусы берілген. Ұзындығын табыңыз (L = 2πR). π = 3.14 деп алғыңыз.",
                input: "Бір бүтін сан - радиус R.",
                output: "Шеңбер ұзындығын шығарыңыз.",
                examples: [{ input: "5", output: "31.4" }, { input: "10", output: "62.8" }],
                check: (code) => code.includes('2') && (code.includes('3.14') || code.includes('3,14')),

            loadLesson();

        function renderList() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            lessons[curL].forEach((l, i) => {
                const node = document.createElement('div');
                const isUnlocked = i <= unlocked;
                let activeClass = '';
                if (i === curI) {
                    if (curL === 'Python') activeClass = 'active';
                    else if (curL === 'C#') activeClass = 'csharp-active';
                    else if (curL === 'C++') activeClass = 'cpp-active';
                }
                node.className = `task-node ${isUnlocked ? 'unlocked' : ''} ${activeClass}`;
                node.innerHTML = `<i class='bx ${i < unlocked ? 'bxs-check-circle' : 'bx-code-alt'}'></i> ${i + 1}. ${l.title}`;
                if (isUnlocked) node.onclick = () => { curI = i; renderList(); loadLesson(); };
                list.appendChild(node);
            });
        }

                    <tbody>
                        ${examplesHtml}
                    </tbody>
                </table>
            </div>
        </div>
    `;

            document.getElementById('code-input').value = "";
            document.getElementById('out').innerText = "> Жүйе дайын...";
            document.getElementById('out').style.color = "#fff";
            document.getElementById('status-badge').innerText = "Дайын";
            document.getElementById('status-badge').style.color = "#94a3b8";
        }

        function checkCode() {
            const code = document.getElementById('code-input').value.trim();
            const out = document.getElementById('out');
            const statusBadge = document.getElementById('status-badge');
            const lesson = lessons[curL][curI];

            if (!code) {
                out.innerText = "> ҚАТЕ: Код жазылмаған!";
                out.style.color = "#ef4444";
                statusBadge.innerText = "Қате";
                statusBadge.style.color = "#ef4444";
                return;
            }

            // Тексеру функциясын шақыру
            const isCorrect = lesson.check(code);
            const errors = lesson.validate ? lesson.validate(code) : [];

            if (isCorrect && errors.length === 0) {

                // 🔥 ОСЫНЫ ҚОСТЫҚ (ПРОГРЕСС САҚТАУ)
                const user = localStorage.getItem("currentUser");
                localStorage.setItem("task_" + user, curI);

                out.innerText = "> ДҰРЫС! ✅\n> Барлық тексерулерден өтті.\n> Келесі сабақ ашылды.";
                out.style.color = "#10b981";
                statusBadge.innerText = "Сәтті";
                statusBadge.style.color = "#10b981";

                if (curI === unlocked && unlocked < lessons[curL].length - 1) {
                    unlocked++;
                }

                setTimeout(() => {
                    if (curI < lessons[curL].length - 1) {
                        curI++;
                        renderList();
                        loadLesson();
                    }
                }, 2000);
            } else {
                let errorMsg = "> ҚАТЕ! ❌\n";

                if (errors.length > 0) {
                    errorMsg += "> Табылған қателер:\n";
                    errors.forEach((err, idx) => {
                        errorMsg += `> ${idx + 1}. ${err}\n`;
                    });
                } else {
                    errorMsg += "> Код тапсырма шартын орындамайды.\n";
                    errorMsg += "> Логиканы тексеріп, қайта жазыңыз.\n";
                }

                out.innerText = errorMsg;
                out.style.color = "#ef4444";
                statusBadge.innerText = "Қате";
                statusBadge.style.color = "#ef4444";
            }
        }

        function showAIHelp() {
            const lesson = lessons[curL][curI];
            const aiText = document.getElementById('ai-text');

            // Тілге сай ескертулер
            let langSpecific = '';
            if (curL === 'C#') {
                langSpecific = '<div style="background: #f3e8ff; padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #9b4f96;"><strong>C# ескертулері:</strong> using System; қосуды ұмытпаңыз! Консоль үшін Console класын қолданыңыз.</div>';
            } else if (curL === 'C++') {
                langSpecific = '<div style="background: #dbeafe; padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #00599c;"><strong>C++ ескертулері:</strong> #include <iostream> және using namespace std; қажет! Енгізу/шығару үшін cin/cout қолданыңыз.</div>';
            }

            aiText.innerHTML = `
        <div style="background: #fef3c7; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid #f59e0b;">
            <strong>💡 Көмек:</strong> Бұл тапсырма бойынша нұсқаулық
        </div>
        ${langSpecific}
        <p>${lesson.aiHelp}</p>
        <div style="margin-top: 15px; padding: 15px; background: #f1f5f9; border-radius: 10px; font-size: 13px; color: #64748b;">
            <strong>Ескерту:</strong> AI тікелей жауап айтпайды, тек бағыт-бағдар береді. Кодты өзіңіз жазу керек!
        </div>
    `;

            document.getElementById('ai-modal').classList.add('active');
        }

        function closeAIModal(event) {
            if (!event || event.target.id === 'ai-modal' || event.target.classList.contains('ai-close')) {
                document.getElementById('ai-modal').classList.remove('active');
            }
        }

        // Клавиатура тіркемелері
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                checkCode();
            }
        });

        function saveTaskProgress() {
            const user = localStorage.getItem("currentUser");
            localStorage.setItem("task_" + user, curI);
        }
    </script>
</body>

</html>
